name: Update Packages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [package-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and update package versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, re, zipfile, io, glob
          import urllib.request

          def parse_version(v):
              try:
                  return tuple(int(x) for x in v.lstrip("v").split("."))
              except Exception:
                  return (0,)

          def gh_request(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          updated = False

          # Collect all known packages from the directory structure
          packages = {}
          for version_file in sorted(glob.glob("source/packages/*/versions/*.json")):
              with open(version_file) as f:
                  pkg = json.load(f)
              name = pkg["name"]
              version = pkg["version"]
              if name not in packages or parse_version(version) > parse_version(packages[name]["version"]):
                  packages[name] = pkg

          for pkg_name, pkg in packages.items():
              pkg_url = pkg.get("url", "")
              m = re.match(r"https://github\.com/([^/]+)/([^/]+)/releases/", pkg_url)
              if not m:
                  print(f"Skipping {pkg_name}: no GitHub releases URL")
                  continue

              owner, repo = m.group(1), m.group(2)

              # Fetch latest release from GitHub API
              try:
                  release = gh_request(f"https://api.github.com/repos/{owner}/{repo}/releases/latest")
              except Exception as e:
                  print(f"Failed to fetch release for {owner}/{repo}: {e}")
                  continue

              tag = release["tag_name"]
              version = tag.lstrip("v")
              version_path = f"source/packages/{pkg_name}/versions/{version}.json"

              if os.path.exists(version_path):
                  print(f"{pkg_name} {version} already up to date")
                  continue

              # Try to get package.json from a release asset first
              new_pkg = None
              for asset in release.get("assets", []):
                  if asset["name"] == "package.json":
                      try:
                          req = urllib.request.Request(asset["browser_download_url"])
                          with urllib.request.urlopen(req) as resp:
                              new_pkg = json.loads(resp.read())
                          print(f"Got package.json from release asset for {pkg_name} {version}")
                      except Exception as e:
                          print(f"Failed to download package.json asset: {e}")
                      break

              # Fall back to extracting from the zip
              if new_pkg is None:
                  zip_url = f"https://github.com/{owner}/{repo}/releases/download/{tag}/{pkg_name}-{version}.zip"
                  print(f"Downloading zip: {zip_url}")
                  try:
                      req = urllib.request.Request(zip_url)
                      with urllib.request.urlopen(req) as resp:
                          zip_data = resp.read()
                      with zipfile.ZipFile(io.BytesIO(zip_data)) as z:
                          pkg_json_name = next(
                              (n for n in z.namelist()
                               if n.endswith("package.json") and n.count("/") <= 1),
                              None
                          )
                          if pkg_json_name is None:
                              print(f"package.json not found in zip for {pkg_name} {version}")
                              continue
                          with z.open(pkg_json_name) as pf:
                              new_pkg = json.load(pf)
                  except Exception as e:
                      print(f"Failed to get zip for {pkg_name} {version}: {e}")
                      continue

              # Ensure url field points to the zip
              zip_url = f"https://github.com/{owner}/{repo}/releases/download/{tag}/{pkg_name}-{version}.zip"
              new_pkg["url"] = zip_url

              os.makedirs(os.path.dirname(version_path), exist_ok=True)
              with open(version_path, "w") as f:
                  json.dump(new_pkg, f, indent=2, ensure_ascii=False)
              print(f"Added {pkg_name} {version}")
              updated = True

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"updated={'true' if updated else 'false'}\n")
          EOF

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/packages/
          git commit -m "chore: auto-update package versions"
          git push
