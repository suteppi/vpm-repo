name: Update Packages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [package-release]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and update package versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, re, zipfile, io, glob
          import urllib.request
          import urllib.error

          def parse_version(v):
              try:
                  return tuple(int(x) for x in v.lstrip("v").split("."))
              except Exception:
                  return (0,)

          def gh_request(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def download(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
              })
              with urllib.request.urlopen(req) as resp:
                  return resp.read()

          updated = False

          # Collect the latest known version per package
          packages = {}
          for version_file in sorted(glob.glob("source/packages/*/versions/*.json")):
              with open(version_file) as f:
                  pkg = json.load(f)
              name = pkg["name"]
              version = pkg["version"]
              if name not in packages or parse_version(version) > parse_version(packages[name]["version"]):
                  packages[name] = pkg

          for pkg_name, pkg in packages.items():
              pkg_url = pkg.get("url", "")
              m = re.match(r"https://github\.com/([^/]+)/([^/]+)/releases/", pkg_url)
              if not m:
                  print(f"Skipping {pkg_name}: no GitHub releases URL")
                  continue

              owner, repo = m.group(1), m.group(2)
              print(f"\nChecking {owner}/{repo} ...")

              try:
                  release = gh_request(f"https://api.github.com/repos/{owner}/{repo}/releases/latest")
              except Exception as e:
                  print(f"  ERROR fetching release: {e}")
                  continue

              tag = release["tag_name"]
              version = tag.lstrip("v")
              print(f"  Latest release: {tag} (version {version})")
              print(f"  Assets: {[a['name'] for a in release.get('assets', [])]}")

              version_path = f"source/packages/{pkg_name}/versions/{version}.json"
              if os.path.exists(version_path):
                  print(f"  Already up to date")
                  continue

              # 1. Try package.json release asset
              new_pkg = None
              for asset in release.get("assets", []):
                  if asset["name"] == "package.json":
                      try:
                          new_pkg = json.loads(download(asset["browser_download_url"]))
                          print(f"  Got package.json from release asset")
                      except Exception as e:
                          print(f"  ERROR downloading package.json asset: {e}")
                      break

              # 2. Find zip asset (exact name or any .zip)
              if new_pkg is None:
                  zip_url = None
                  expected_zip = f"{pkg_name}-{version}.zip"
                  for asset in release.get("assets", []):
                      if asset["name"] == expected_zip:
                          zip_url = asset["browser_download_url"]
                          print(f"  Found zip asset: {asset['name']}")
                          break
                  if zip_url is None:
                      for asset in release.get("assets", []):
                          if asset["name"].endswith(".zip"):
                              zip_url = asset["browser_download_url"]
                              print(f"  Using zip asset: {asset['name']}")
                              break
                  # 3. Fall back to constructed URL
                  if zip_url is None:
                      zip_url = f"https://github.com/{owner}/{repo}/releases/download/{tag}/{pkg_name}-{version}.zip"
                      print(f"  Trying constructed URL: {zip_url}")

                  try:
                      zip_data = download(zip_url)
                      with zipfile.ZipFile(io.BytesIO(zip_data)) as z:
                          print(f"  Zip contents: {z.namelist()}")
                          pkg_json_name = next(
                              (n for n in z.namelist()
                               if n.split("/")[-1] == "package.json"),
                              None
                          )
                          if pkg_json_name is None:
                              print(f"  ERROR: package.json not found in zip")
                              continue
                          with z.open(pkg_json_name) as pf:
                              new_pkg = json.load(pf)
                          print(f"  Extracted package.json from {pkg_json_name}")
                  except Exception as e:
                      print(f"  ERROR getting zip: {e}")
                      continue

              # Always use the standard zip URL in the url field
              new_pkg["url"] = f"https://github.com/{owner}/{repo}/releases/download/{tag}/{pkg_name}-{version}.zip"

              os.makedirs(os.path.dirname(version_path), exist_ok=True)
              with open(version_path, "w") as f:
                  json.dump(new_pkg, f, indent=2, ensure_ascii=False)
              print(f"  Added {pkg_name} {version}")
              updated = True

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"updated={'true' if updated else 'false'}\n")
          EOF

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/packages/
          git commit -m "chore: auto-update package versions"
          git push
