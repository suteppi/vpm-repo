name: Build Listing

on:
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [package-release]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build VPM Listing
        run: |
          python3 - <<'PYEOF'
          import json, os, glob

          with open("source/index.json") as f:
              listing = json.load(f)

          listing.setdefault("packages", {})

          for version_file in glob.glob("source/packages/*/*/*.json"):
              with open(version_file) as f:
                  pkg = json.load(f)
              pkg_name = pkg["name"]
              pkg_version = pkg["version"]
              listing["packages"].setdefault(pkg_name, {"versions": {}})
              listing["packages"][pkg_name]["versions"][pkg_version] = pkg

          os.makedirs("Website", exist_ok=True)
          with open("Website/index.json", "w") as f:
              json.dump(listing, f, indent=2)

          print("Built Website/index.json")
          PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Website
