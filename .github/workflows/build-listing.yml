name: Build Listing

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build VPM Listing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, re, zipfile, io
          import urllib.request

          def gh_request(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              })
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          def download(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
              })
              with urllib.request.urlopen(req) as resp:
                  return resp.read()

          with open("source/index.json") as f:
              listing = json.load(f)

          listing["packages"] = {}

          for source_file in glob.glob("source/packages/*/source.json"):
              with open(source_file) as f:
                  source = json.load(f)

              owner_repo = source["github"]
              pkg_name = source["packageName"]
              print(f"\nFetching releases for {owner_repo} ...")

              try:
                  releases = gh_request(f"https://api.github.com/repos/{owner_repo}/releases?per_page=100")
              except Exception as e:
                  print(f"  ERROR: {e}")
                  continue

              listing["packages"].setdefault(pkg_name, {"versions": {}})

              for release in releases:
                  if release.get("draft"):
                      continue

                  tag = release["tag_name"]
                  version = tag.lstrip("v")
                  print(f"  Processing {tag} ...")

                  pkg = None

                  # 1. Try package.json release asset
                  for asset in release.get("assets", []):
                      if asset["name"] == "package.json":
                          try:
                              pkg = json.loads(download(asset["browser_download_url"]))
                              print(f"    Got package.json from release asset")
                          except Exception as e:
                              print(f"    ERROR downloading package.json asset: {e}")
                          break

                  # 2. Try zip asset
                  if pkg is None:
                      zip_url = None
                      expected_zip = f"{pkg_name}-{version}.zip"
                      for asset in release.get("assets", []):
                          if asset["name"] == expected_zip:
                              zip_url = asset["browser_download_url"]
                              break
                      if zip_url is None:
                          for asset in release.get("assets", []):
                              if asset["name"].endswith(".zip"):
                                  zip_url = asset["browser_download_url"]
                                  break
                      # 3. Fall back to constructed URL
                      if zip_url is None:
                          zip_url = f"https://github.com/{owner_repo}/releases/download/{tag}/{pkg_name}-{version}.zip"

                      try:
                          zip_data = download(zip_url)
                          with zipfile.ZipFile(io.BytesIO(zip_data)) as z:
                              pkg_json_name = next(
                                  (n for n in z.namelist() if n.split("/")[-1] == "package.json"),
                                  None
                              )
                              if pkg_json_name is None:
                                  print(f"    ERROR: package.json not found in zip")
                                  continue
                              with z.open(pkg_json_name) as pf:
                                  pkg = json.load(pf)
                              print(f"    Extracted package.json from zip")
                      except Exception as e:
                          print(f"    ERROR getting zip: {e}")
                          continue

                  pkg["url"] = f"https://github.com/{owner_repo}/releases/download/{tag}/{pkg_name}-{version}.zip"
                  listing["packages"][pkg_name]["versions"][version] = pkg

          os.makedirs("Website", exist_ok=True)
          with open("Website/vpm.json", "w") as f:
              json.dump(listing, f, indent=2, ensure_ascii=False)

          print("\nBuilt Website/vpm.json")
          PYEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Website
